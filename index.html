<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GET IN DA BOOTH</title>
<script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'DM Mono', monospace; }
  #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
  #emotion-wash { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.6s, background 0.6s; mix-blend-mode: color; }
  #shock-flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.05s; }
  .vignette { position: fixed; inset: 0; background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%); pointer-events: none; }
  .title-bar { position: fixed; top: 0; left: 0; right: 0; padding: 20px 28px 16px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%); pointer-events: none; }
  .title-bar h1 { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.15em; color: rgba(255,255,255,0.7); }
  .live-pip { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); pointer-events: none; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; transition: background 0.4s; }
  .live-dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #trigger-label { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 1rem; font-weight: 500; letter-spacing: 0.2em; color: rgba(255,255,255,0.92); text-shadow: 0 1px 12px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.15s; pointer-events: none; white-space: nowrap; }
  #detection-readout { position: fixed; top: 56px; left: 28px; pointer-events: none; opacity: 0; transition: opacity 0.4s; }
  #detection-readout.visible { opacity: 1; }
  #detection-readout .det-header { font-size: 0.5rem; letter-spacing: 0.22em; color: rgba(255,255,255,0.35); margin-bottom: 4px; }
  #detection-readout .det-value { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; color: rgba(255,255,255,0.9); line-height: 1.4; }
  #detection-readout .det-desc { font-size: 0.6rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); margin-top: 2px; }
  #detect-log { position: fixed; top: 60px; right: 28px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; pointer-events: none; }
  .log-entry { font-size: 0.62rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.3); backdrop-filter: blur(6px); padding: 4px 10px; border-radius: 20px; animation: fadeUp 0.3s ease; white-space: nowrap; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  #side-menu { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; align-items: flex-end; z-index: 100; }
  .menu-pill { display: flex; align-items: center; gap: 10px; background: rgba(20,20,20,0.72); backdrop-filter: blur(14px) saturate(1.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 10px 16px 10px 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; color: rgba(255,255,255,0.75); font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.08em; -webkit-tap-highlight-color: transparent; user-select: none; }
  .menu-pill:hover { background: rgba(35,35,35,0.85); border-color: rgba(255,255,255,0.22); color: rgba(255,255,255,0.95); }
  .menu-pill.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); color: #fff; }
  .pill-emoji { font-size: 1.1rem; line-height: 1; }
  .pill-label { font-size: 0.65rem; letter-spacing: 0.1em; }
  #gesture-dropdown { background: rgba(20,20,20,0.82); backdrop-filter: blur(18px) saturate(1.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 6px; display: none; flex-direction: column; gap: 2px; min-width: 200px; }
  #gesture-dropdown.open { display: flex; }
  .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; color: rgba(255,255,255,0.7); font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.06em; -webkit-tap-highlight-color: transparent; }
  .dropdown-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .dropdown-item.selected { background: rgba(255,255,255,0.1); color: #fff; }
  .dropdown-item.selected::after { content: '✓'; margin-left: auto; opacity: 0.6; font-size: 0.6rem; }
  .dropdown-icon { font-size: 1rem; width: 20px; text-align: center; }
  .dropdown-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 3px 6px; }
  .dropdown-header { padding: 6px 12px 4px; font-size: 0.55rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.3); text-transform: uppercase; }
  #tap-to-enter {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; z-index: 300; cursor: pointer; transition: opacity 0.5s;
  }
  #tap-to-enter.hide { opacity: 0; pointer-events: none; }
  .tte-title { font-size: 1rem; font-weight: 300; letter-spacing: 0.25em; color: rgba(255,255,255,0.7); }
  .tte-btn {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15);
    padding: 12px 28px; border-radius: 40px; background: rgba(255,255,255,0.05);
    transition: all 0.2s; cursor: pointer;
  }
  .tte-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.3); }
  #loading-overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 200; transition: opacity 0.6s; }
  #loading-overlay.fade { opacity: 0; pointer-events: none; }
  .loading-title { font-size: 1rem; font-weight: 300; letter-spacing: 0.25em; color: rgba(255,255,255,0.6); }
  .loading-msg { font-size: 0.65rem; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); }
  .loading-bar { width: 120px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
  .loading-bar::after { content: ''; position: absolute; top: 0; left: -50%; width: 50%; height: 100%; background: rgba(255,255,255,0.5); animation: scan 1.4s ease-in-out infinite; }
  @keyframes scan { 0%{left:-50%} 100%{left:150%} }
  .shock-zoom { animation: shockZoom 0.7s ease-out; }
  @keyframes shockZoom { 0%{transform:scaleX(-1) scale(1)} 25%{transform:scaleX(-1) scale(1.08)} 100%{transform:scaleX(-1) scale(1)} }
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<div id="emotion-wash"></div>
<div id="shock-flash"></div>
<div class="vignette"></div>

<div class="title-bar">
  <h1>GET IN DA BOOTH</h1>
  <div class="live-pip">
    <div class="live-dot" id="live-dot"></div>
    <span id="live-text">loading</span>
  </div>
</div>

<div id="detection-readout">
  <div class="det-header">DETECTED</div>
  <div class="det-value" id="det-value">—</div>
  <div class="det-desc" id="det-desc"></div>
</div>

<div id="detect-log"></div>
<div id="trigger-label"></div>

<div id="side-menu">
  <div class="menu-pill" id="emotion-btn">
    <span class="pill-emoji" id="emotion-emoji">😶</span>
    <span class="pill-label" id="emotion-label">detect emotion?</span>
  </div>
  <div class="menu-pill" id="options-btn">
    <span class="pill-emoji">🎭</span>
    <span class="pill-label">options</span>
  </div>
  <div id="gesture-dropdown">
    <div class="dropdown-header">gesture sounds</div>
    <div class="dropdown-item selected" data-gesture="tongue"><span class="dropdown-icon">👅</span> tongue out → ah!</div>
    <div class="dropdown-item selected" data-gesture="duck"><span class="dropdown-icon">🦆</span> duck face → quack</div>
    <div class="dropdown-item selected" data-gesture="gun"><span class="dropdown-icon">🔫</span> finger gun → bang</div>
    <div class="dropdown-item selected" data-gesture="heart"><span class="dropdown-icon">🫰</span> korean heart → ♡</div>
    <div class="dropdown-sep"></div>
    <div class="dropdown-item" data-gesture="all"><span class="dropdown-icon">✨</span> enable all</div>
  </div>
</div>

<div id="tap-to-enter">
  <div class="tte-title">GET IN DA BOOTH</div>
  <div class="tte-btn">tap to enter</div>
</div>

<div id="loading-overlay" style="display:none">
  <div class="loading-title">GET IN DA BOOTH</div>
  <div class="loading-bar"></div>
  <div class="loading-msg" id="loading-msg">requesting camera access</div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────────────────────
let actx;
function getCtx() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }

// Intro sound — plays on load screen
const introAudio = new Audio('./latto_get_in_da_booth.mp3');
introAudio.volume = 1.0;

const sounds = {
  // youtube to mp3 converter - https://notube.net/en/youtube-app-317
  ah:    new Audio('./ah_short.mp3'),
  quack: new Audio('./quack.mp3'),
  fahh:  new Audio('./fahh.mp3'),
  // wow:   new Audio('./wow.mp3'),
  heart: new Audio('./heart_shalala.mp3'),
  gun:   new Audio('./finger_guns.mp3'),
};
function playSound(key) {
  getCtx();
  const s = sounds[key];
  if (!s) { console.warn('no sound for:', key); return; }
  s.currentTime = 0;
  s.play().catch(e => console.warn('play failed:', key, e));
}
function playAh()       { playSound('ah'); }
function playQuack()    { playSound('quack'); }
function playGunshot()  { playSound('gun'); }
function playHeart()    { playSound('heart'); }
function playSurprise() { playSound('fahh'); } // fallback to fahh since wow is commented out
function playFahh()     { playSound('fahh'); }

// ── State ─────────────────────────────────────────────────────────────────
let emotionMode = false, modelsLoaded = false, isRunning = false;
let enabledGestures = new Set(['tongue','duck','gun','heart']);
let lastEmotionTrigger = 0, lastGestureTrigger = {}, currentEmotion = '';
let frameCount = 0, handposeModel = null, tfLoaded = false;
const ECOOL = 3000, GCOOL = 2500;

const video       = document.getElementById('video');
const emotionWash = document.getElementById('emotion-wash');
const shockFlash  = document.getElementById('shock-flash');
const trigLabel   = document.getElementById('trigger-label');
const detReadout  = document.getElementById('detection-readout');
const detValue    = document.getElementById('det-value');
const detDesc     = document.getElementById('det-desc');
const detectLog   = document.getElementById('detect-log');

const EMO = {
  happy:     { emoji:'😄', wash:'rgba(255,210,0,0.35)',  label:'happy',     filter:'saturate(1.6) brightness(1.1)' },
  sad:       { emoji:'😢', wash:'rgba(50,80,255,0.3)',   label:'sad',       filter:'saturate(0.35) hue-rotate(210deg)' },
  angry:     { emoji:'😡', wash:'rgba(220,20,20,0.32)',  label:'angry',     filter:'saturate(1.8) hue-rotate(-15deg)' },
  surprised: { emoji:'😱', wash:'rgba(160,0,255,0.22)',  label:'shocked',   filter:'contrast(1.25) saturate(1.4)' },
  disgusted: { emoji:'🤢', wash:'rgba(0,180,60,0.28)',   label:'disgusted', filter:'saturate(0.5) hue-rotate(95deg)' },
  fearful:   { emoji:'😨', wash:'rgba(80,0,180,0.3)',    label:'fearful',   filter:'saturate(0.2) brightness(0.75)' },
  neutral:   { emoji:'😐', wash:'transparent',           label:'neutral',   filter:'none' },
};

// ── Helpers ───────────────────────────────────────────────────────────────
let labelTimer;
function showLabel(t) {
  trigLabel.textContent = t; trigLabel.style.opacity = '1';
  clearTimeout(labelTimer);
  labelTimer = setTimeout(() => { trigLabel.style.opacity = '0'; }, 1800);
}
function setDetected(emoji, val, desc) {
  detValue.textContent = emoji + ' ' + val;
  detDesc.textContent = desc;
  detReadout.classList.add('visible');
}
function addLog(text) {
  const el = document.createElement('div');
  el.className = 'log-entry'; el.textContent = text;
  detectLog.insertBefore(el, detectLog.firstChild);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.5s'; setTimeout(()=>el.remove(),500); }, 3500);
}

// ── Emotion ───────────────────────────────────────────────────────────────
function handleEmotion(expr, conf) {
  const cfg = EMO[expr]; if (!cfg) return;
  if (emotionMode) {
    setDetected(cfg.emoji, cfg.label, Math.round(conf*100)+'% confidence');
    video.style.filter = cfg.filter;
    emotionWash.style.background = cfg.wash;
    emotionWash.style.opacity = expr === 'neutral' ? '0' : '1';
  }
  const now = Date.now();
  if (expr !== currentEmotion) {
    if (expr === 'surprised' && conf > 0.7 && now - lastEmotionTrigger > ECOOL) {
      lastEmotionTrigger = now; playSurprise();
      video.classList.add('shock-zoom');
      shockFlash.style.opacity = '0.5';
      setTimeout(()=>{ shockFlash.style.opacity='0'; }, 80);
      setTimeout(()=>{ video.classList.remove('shock-zoom'); }, 700);
      showLabel('😱 shocked'); addLog('😱 shocked');
    } else if (expr === 'angry' && conf > 0.65 && now - lastEmotionTrigger > ECOOL) {
      lastEmotionTrigger = now; playFahh();
      showLabel('😡 angry'); addLog('😡 angry');
    } else if (expr !== 'neutral' && conf > 0.65 && now - lastEmotionTrigger > ECOOL) {
      lastEmotionTrigger = now;
      addLog(cfg.emoji + ' ' + cfg.label);
    }
  }
  currentEmotion = expr;
}

// ── Face gestures ─────────────────────────────────────────────────────────
function checkFaceGestures(landmarks) {
  const pts = landmarks.positions;
  const now = Date.now();
  const upperLip   = pts[51], lowerLip   = pts[57];
  const upperInner = pts[62], lowerInner = pts[66];
  const leftCorner = pts[48], rightCorner= pts[54];
  const mouthW  = Math.hypot(rightCorner.x-leftCorner.x, rightCorner.y-leftCorner.y);
  const mouthH  = Math.hypot(upperLip.x-lowerLip.x, upperLip.y-lowerLip.y);
  const innerH  = Math.hypot(upperInner.x-lowerInner.x, upperInner.y-lowerInner.y);
  const openR   = mouthH / mouthW;
  const innerR  = innerH / mouthW;
  const faceW   = Math.hypot(pts[16].x-pts[0].x, pts[16].y-pts[0].y);
  const mouthWR = mouthW / faceW;

  // Tongue: mouth must be EXTREMELY open — basically only tongue-out achieves this
  if (enabledGestures.has('tongue') && openR > 0.82 && innerR > 0.42) {
    if (!lastGestureTrigger.tongue || now - lastGestureTrigger.tongue > GCOOL) {
      lastGestureTrigger.tongue = now; playAh();
      showLabel('👅 ah!'); addLog('👅 tongue out → ah!');
      setDetected('👅', 'tongue out', 'mouth fully open');
    }
    return;
  }
  // Duck face: narrow pursed lips
  if (enabledGestures.has('duck') && mouthWR < 0.28 && openR > 0.05 && openR < 0.28) {
    if (!lastGestureTrigger.duck || now - lastGestureTrigger.duck > GCOOL) {
      lastGestureTrigger.duck = now; playQuack();
      showLabel('🦆 quack'); addLog('🦆 duck face → quack');
      setDetected('🦆', 'duck face', 'lips pursed');
    }
  }
}

// ── Hand gestures ─────────────────────────────────────────────────────────
function d2(kp,a,b){ return Math.sqrt((kp[a].x-kp[b].x)**2+(kp[a].y-kp[b].y)**2); }
// Extended: tip is clearly higher than pip, pip higher than mcp
function ext(kp,tip,pip,mcp){ return kp[tip].y < kp[pip].y-8 && kp[pip].y < kp[mcp].y-8; }
// Curled: tip is clearly below pip
function curl(kp,tip,pip){ return kp[tip].y > kp[pip].y+8; }

function detectHandGestures(hands) {
  if (!hands?.length) return;
  const now = Date.now();
  for (const hand of hands) {
    const kp = hand.keypoints;
    if (!kp || kp.length < 21) continue;
    const sz = d2(kp,0,9);
    if (sz < 50) continue; // hand too far away

    const idxExt = ext(kp,8,6,5);
    const midExt = ext(kp,12,10,9);
    const rngExt = ext(kp,16,14,13);
    const pnkExt = ext(kp,20,18,17);
    const thumbExt = d2(kp,4,5)/sz > 0.45;

    // Finger gun: index + thumb out, rest curled
    if (enabledGestures.has('gun') && idxExt && thumbExt && !midExt && !rngExt && !pnkExt) {
      if (!lastGestureTrigger.gun || now - lastGestureTrigger.gun > GCOOL) {
        lastGestureTrigger.gun = now; playGunshot();
        showLabel('🔫 bang'); addLog('🔫 finger gun → bang');
        setDetected('🔫','finger gun','index up, thumb out');
      }
      return;
    }

    // Korean heart: thumb + index tips pinched, others curled
    const pinch = d2(kp,4,8)/sz;
    const isHeart = pinch < 0.35 && curl(kp,12,10) && curl(kp,16,14) && curl(kp,20,18);
    if (enabledGestures.has('heart') && isHeart) {
      if (!lastGestureTrigger.heart || now - lastGestureTrigger.heart > GCOOL) {
        lastGestureTrigger.heart = now; playHeart();
        showLabel('🫰 ♡'); addLog('🫰 korean heart → ♡');
        setDetected('🫰','korean heart','thumb + index pinch');
      }
      return;
    }
  }
  // Two-hand heart
  if (hands.length === 2 && enabledGestures.has('heart')) {
    const h1=hands[0].keypoints, h2=hands[1].keypoints;
    const sz=d2(h1,0,9);
    const wd=Math.hypot(h1[0].x-h2[0].x,h1[0].y-h2[0].y);
    if (wd/sz < 1.3 && (!lastGestureTrigger.bigheart || now-lastGestureTrigger.bigheart > GCOOL)) {
      lastGestureTrigger.bigheart = now; playHeart();
      showLabel('♡ heart'); addLog('🤗 double heart → ♡');
      setDetected('♡','double heart','both hands together');
    }
  }
}

// ── Load handpose ─────────────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((res,rej) => {
    if (document.querySelector('script[src="'+src+'"]')) { res(); return; }
    const s = document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}
async function loadHandpose() {
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0/dist/tf-core.min.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0/dist/tf-backend-webgl.min.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0/dist/tf-converter.min.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js');
    await tf.setBackend('webgl');
    await tf.ready();
    handposeModel = await handPoseDetection.createDetector(
      handPoseDetection.SupportedModels.MediaPipeHands,
      { runtime:'tfjs', modelType:'lite', maxHands:2 }
    );
    tfLoaded = true;
    console.log('✅ hand tracking ready');
  } catch(e) { console.warn('hand tracking unavailable:', e); }
}

// ── Detection loop ────────────────────────────────────────────────────────
async function detectionLoop() {
  if (!isRunning) return;
  frameCount++;
  try {
    if (modelsLoaded && frameCount % 2 === 0) {
      const dets = await faceapi
        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize:224, scoreThreshold:0.4 }))
        .withFaceLandmarks(true)
        .withFaceExpressions();
      if (dets.length > 0) {
        const det = dets[0];
        if (det.expressions) {
          const [expr,conf] = Object.entries(det.expressions).sort((a,b)=>b[1]-a[1])[0];
          handleEmotion(expr, conf);
        }
        if (det.landmarks) checkFaceGestures(det.landmarks);
      } else if (emotionMode) {
        video.style.filter='none'; emotionWash.style.opacity='0';
        detValue.textContent='no face'; detDesc.textContent='';
      }
    }
    if (tfLoaded && handposeModel && frameCount % 3 === 0) {
      const hands = await handposeModel.estimateHands(video);
      detectHandGestures(hands);
    }
  } catch(e) {}
  requestAnimationFrame(detectionLoop);
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const overlay = document.getElementById('loading-overlay');
  const msg = document.getElementById('loading-msg');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ width:{ideal:1280}, height:{ideal:720}, facingMode:'user' }, audio:false
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    msg.textContent = 'loading models';
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';

    // Load models + enforce 5 second minimum loading screen in parallel
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
      faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL),
      new Promise(r => setTimeout(r, 5000)),
    ]);

    modelsLoaded = true;
    document.getElementById('live-dot').classList.add('on');
    document.getElementById('live-text').textContent = 'live';
    overlay.classList.add('fade');
    setTimeout(()=>{ overlay.style.display='none'; }, 700);
    isRunning = true;
    detReadout.classList.add('visible');
    loadHandpose();
    requestAnimationFrame(detectionLoop);
  } catch(e) { msg.textContent = 'error: ' + e.message; }
}

// ── Controls ──────────────────────────────────────────────────────────────
const emotionBtn   = document.getElementById('emotion-btn');
const emotionEmoEl = document.getElementById('emotion-emoji');
const emotionLblEl = document.getElementById('emotion-label');

emotionBtn.addEventListener('click', () => {
  if (!modelsLoaded) return;
  getCtx(); emotionMode = !emotionMode;
  emotionBtn.classList.toggle('active', emotionMode);
  if (emotionMode) {
    emotionEmoEl.textContent='🙂'; emotionLblEl.textContent='stop detecting';
    detReadout.classList.add('visible');
  } else {
    emotionEmoEl.textContent='😶'; emotionLblEl.textContent='detect emotion?';
    video.style.filter='none'; emotionWash.style.opacity='0';
    detValue.textContent='—'; detDesc.textContent=''; currentEmotion='';
  }
});

const optionsBtn = document.getElementById('options-btn');
const dropdown   = document.getElementById('gesture-dropdown');
optionsBtn.addEventListener('click', e => {
  e.stopPropagation(); getCtx();
  dropdown.classList.toggle('open');
  optionsBtn.classList.toggle('active', dropdown.classList.contains('open'));
});
document.querySelectorAll('.dropdown-item[data-gesture]').forEach(item => {
  item.addEventListener('click', e => {
    e.stopPropagation();
    const g = item.dataset.gesture;
    if (g === 'all') {
      enabledGestures = new Set(['tongue','duck','gun','heart']);
      document.querySelectorAll('.dropdown-item[data-gesture]').forEach(i => i.classList.toggle('selected', i.dataset.gesture!=='all'));
    } else {
      document.querySelector('.dropdown-item[data-gesture="all"]').classList.remove('selected');
      if (enabledGestures.has(g)) { enabledGestures.delete(g); item.classList.remove('selected'); }
      else { enabledGestures.add(g); item.classList.add('selected'); }
    }
  });
});
document.addEventListener('click', () => {
  dropdown.classList.remove('open'); optionsBtn.classList.remove('active');
});

window.addEventListener('load', () => {
  const tte = document.getElementById('tap-to-enter');
  const overlay = document.getElementById('loading-overlay');
  tte.addEventListener('click', async () => {
    // Unlock audio — must resume context AND play after user gesture
    const ctx = getCtx();
    await ctx.resume();
    introAudio.play().catch(e => console.warn('intro audio failed:', e));
    tte.classList.add('hide');
    setTimeout(() => {
      tte.style.display = 'none';
      overlay.style.display = 'flex';
    }, 500);
    init();
  });
});
</script>
</body>
